<svg width="680" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Probability of each remaining team winning the 2026 World Cup">
<title>Probability of winning the 2026 World Cup</title>
<text x="10" y="28" text-anchor="start" fill="#6b6a66" font-size="14">Probability of winning the 2026 World Cup (%)  —  20,000 simulations from the semi-finals</text>
<rect x="125" y="46" width="446" height="14" rx="2" fill="#0F6E56"/><text x="118" y="57" text-anchor="end" fill="#6b6a66" font-size="12">France</text><text x="576" y="57" text-anchor="start" fill="#6b6a66" font-size="11">33.5</text>
<rect x="125" y="67" width="422" height="14" rx="2" fill="#0F6E56"/><text x="118" y="78" text-anchor="end" fill="#6b6a66" font-size="12">Spain</text><text x="552" y="78" text-anchor="start" fill="#6b6a66" font-size="11">31.7</text>
<rect x="125" y="88" width="325" height="14" rx="2" fill="#1D9E75"/><text x="118" y="99" text-anchor="end" fill="#6b6a66" font-size="12">Argentina</text><text x="455" y="99" text-anchor="start" fill="#6b6a66" font-size="11">24.4</text>
<rect x="125" y="109" width="140" height="14" rx="2" fill="#5DCAA5"/><text x="118" y="120" text-anchor="end" fill="#6b6a66" font-size="12">England</text><text x="270" y="120" text-anchor="start" fill="#6b6a66" font-size="11">10.5</text>
</svg>
